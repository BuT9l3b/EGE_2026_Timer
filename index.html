<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таймеры до ЕГЭ</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family:'Inter',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      color:#fff;
      padding:40px 20px;
    }

    .container {
      max-width:1400px;
      margin:0 auto;
    }

    h1 {
      text-align:center;
      font-size:3.5rem;
      font-weight:700;
      margin-bottom:16px;
      background:linear-gradient(90deg,#e94560,#ffd460);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .subtitle {
      text-align:center;
      color:#ccc;
      margin-bottom:50px;
      font-size:1.4rem;
    }

    .nearest-exam {
      background:linear-gradient(135deg,#e94560 0%,#ff6b6b 100%);
      border-radius:24px;
      padding:36px;
      margin-bottom:50px;
      text-align:center;
      box-shadow:0 10px 40px rgba(233,69,96,0.3);
    }

    .nearest-exam h2 {
      font-size:1.2rem;
      text-transform:uppercase;
      letter-spacing:2px;
      opacity:0.9;
      margin-bottom:12px;
    }

    .nearest-exam .exam-name {
      font-size:2.4rem;
      font-weight:700;
    }

    .nearest-exam .exam-date {
      font-size:1.4rem;
      opacity:0.9;
      margin-top:12px;
    }

    .timers-grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:28px;
    }

    .timer-card {
      background:rgba(255,255,255,0.05);
      border-radius:24px;
      padding:32px 28px;
      border:1px solid rgba(255,255,255,0.1);
      transition:all 0.3s ease;
      min-width:0;
    }

    .timer-card:hover {
      transform:translateY(-6px);
      border-color:rgba(233,69,96,0.4);
      box-shadow:0 20px 50px rgba(0,0,0,0.3);
    }

    .timer-card.next {
      border-color:#e94560;
      background:linear-gradient(135deg,rgba(233,69,96,0.15) 0%,rgba(255,107,107,0.1) 100%);
    }

    .timer-card .exam-title {
      font-size:1.2rem;
      font-weight:600;
      color:#ccc;
      margin-bottom:22px;
      white-space:nowrap;
    }

    .timer-card.next .exam-title {
      color:#ff6b6b;
    }

    .timer-card .countdown {
      display:flex;
      gap:14px;
      justify-content:center;
    }

    .timer-card .time-block {
      text-align:center;
      min-width:52px;
    }

    .timer-card .time-value {
      font-size:1.9rem;
      font-weight:700;
      color:#fff;
      display:block;
    }

    .timer-card .time-label {
      font-size:0.8rem;
      color:#fff;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .timer-card .exam-time {
      text-align:center;
      margin-top:18px;
      font-size:0.95rem;
      color:#fff;
    }

    .timer-card.expired {
      opacity:0.5;
    }

    .timer-card.expired .time-value {
      color:#999;
    }

    .timer-card.expired::after {
      content:"✓ Экзамен сдан!";
      display:block;
      text-align:center;
      color:#4ade80;
      font-weight:600;
      margin-top:12px;
    }

    @media (max-width:1000px) {
      .timers-grid {
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width:600px) {
      h1 { font-size:2.2rem; }
      .nearest-exam { padding:24px; }
      .nearest-exam .exam-name { font-size:1.6rem; }
      .timer-card { padding:22px 18px; }
      .timer-card .exam-title { font-size:1rem; white-space:normal; }
      .timer-card .time-value { font-size:1.5rem; }
      .timer-card .time-block { min-width:42px; }
      .timer-card .countdown { gap:8px; }
      .timers-grid {
        grid-template-columns:repeat(2,1fr);
        gap:16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>До ЕГЭ осталось</h1>
    <p class="subtitle">Отсчет времени до каждого экзамена</p>

    <div class="nearest-exam">
      <h2>Ближайший экзамен</h2>
      <div class="exam-name" id="nearestName">—</div>
      <div class="exam-date" id="nearestDate">—</div>
    </div>

    <div class="timers-grid" id="timersGrid">
    </div>
  </div>

  <script>
    const EXAM_DATES = {
      russian:     "2026-06-04T10:00:00+03:00",
      math_profile:"2026-06-08T10:00:00+03:00",
      physics:     "2026-06-11T10:00:00+03:00",
      informatics: "2026-06-18T10:00:00+03:00",
    };

    const EXAM_NAMES = {
      russian:     "ЕГЭ: Русский язык",
      math_profile:"ЕГЭ: Математика (профиль)",
      physics:     "ЕГЭ: Физика",
      informatics: "ЕГЭ: Информатика",
    };

    function getTimeRemaining(targetDate) {
      const now = new Date();
      const target = new Date(targetDate);
      const diff = target - now;

      if (diff <= 0) {
        return { days:0, hours:0, minutes:0, seconds:0, expired:true };
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      return { days, hours, minutes, seconds, expired:false };
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('ru-RU', {
        day:'numeric',
        month:'long',
        hour:'2-digit',
        minute:'2-digit'
      });
    }

    function padZero(num) {
      return num.toString().padStart(2,'0');
    }

    function getNearestExam() {
      const now = new Date();
      let nearest = null;
      let nearestKey = null;

      for (const [key, date] of Object.entries(EXAM_DATES)) {
        const examDate = new Date(date);
        if (examDate > now) {
          if (!nearest || examDate < nearest) {
            nearest = examDate;
            nearestKey = key;
          }
        }
      }

      return nearestKey;
    }

    function renderTimers() {
      const grid = document.getElementById('timersGrid');
      grid.innerHTML = '';

      const nearestKey = getNearestExam();

      for (const [key, date] of Object.entries(EXAM_DATES)) {
        const time = getTimeRemaining(date);
        const isNearest = key === nearestKey && !time.expired;

        const card = document.createElement('div');
        card.className = `timer-card${isNearest ? ' next' : ''}${time.expired ? ' expired' : ''}`;

        card.innerHTML = `
          <div class="exam-title">${EXAM_NAMES[key]}</div>
          <div class="countdown">
            <div class="time-block">
              <span class="time-value">${padZero(time.days)}</span>
              <span class="time-label">Дней</span>
            </div>
            <div class="time-block">
              <span class="time-value">${padZero(time.hours)}</span>
              <span class="time-label">Часов</span>
            </div>
            <div class="time-block">
              <span class="time-value">${padZero(time.minutes)}</span>
              <span class="time-label">Мин</span>
            </div>
            <div class="time-block">
              <span class="time-value">${padZero(time.seconds)}</span>
              <span class="time-label">Сек</span>
            </div>
          </div>
          <div class="exam-time">${formatDate(date)}</div>
        `;

        grid.appendChild(card);
      }

      if (nearestKey) {
        document.getElementById('nearestName').textContent = EXAM_NAMES[nearestKey];
        document.getElementById('nearestDate').textContent = formatDate(EXAM_DATES[nearestKey]);
      } else {
        document.getElementById('nearestName').textContent = 'Все экзамены сданы!';
        document.getElementById('nearestDate').textContent = '';
      }
    }

    renderTimers();
    setInterval(renderTimers, 1000);
  </script>
</body>
</html>
